# Experiment settings (required) 
num_behaviors: 5   # set to null to use all behaviors 
concurrency_limit: 2

# Resource limits (required)
max_turns: 5
max_epochs: 10

# Independent judge (optional)
independent_judge: true
independent_judge_config:
  model: gpt-4o
  provider: openai
  judge_types: [XTeaming, ChainOfAttack, FootInTheDoor]
  majority_vote_threshold: 3

# Attack configuration (required) 
attack_type: Crescendo
attack_config:
  attacker_model:
    model: Qwen/Qwen2.5-32B-Instruct
    provider: local
    base_url: http://10.100.0.0:30000/v1
  judge_model:
    model: gpt-4o
    provider: openai
  max_refines_per_turn: 10

# Defense configuration (optional)
# Parsed by run_benchmark / load_config → JailbreakEngine(defense_types=..., defense_config=...).
# Enum values must match engine.defense_type.DefenseType (e.g. Guard, Dummy).
defense_types:
  - Guard
defense_config:
  Guard:
    guard_type: circuit_breaker
    base_url: http://localhost:8080/v1
    model: guard

# Target model configuration (required) 
target_config:
  model: gpt-4o
  provider: openai
